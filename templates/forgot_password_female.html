<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #aa25fc);
            color: white;
            padding: 40px;
        }

        .card {
            max-width: 400px;
            margin: auto;
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: gold;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .back-link {
            margin-top: 15px;
            text-align: center;
        }

        a {
            color: #ffd700;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Forgot Password</h2>

    <form method="POST">
        <label>Enter Registered Mobile Number:</label>
        <input type="text" name="mobile" placeholder="Enter mobile number" required>

        <button type="submit">Send OTP</button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('female') }}?login=1">Back to Login</a>
    </div>
</div>

</body>
</html>
